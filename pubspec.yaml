name: advanced_alarm_app
description: "Advanced Alarm App — reliable scheduling engine built on flutter_local_notifications + android_alarm_manager_plus."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Notifications & scheduling ---
  flutter_local_notifications: ^17.2.3
  android_alarm_manager_plus: ^4.0.7
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # --- Permissions ---
  permission_handler: ^11.3.1

  # --- Local storage (document DB) ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- State management ---
  provider: ^6.1.2

  # --- Internationalization / formatting ---
  intl: ^0.19.0

  # --- Audio playback (alarm sounds) ---
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
