name: advanced_alarm_app
description: "Advanced Alarm App - foundational scaffold with reliable scheduling, modern UI and full localization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Notifications & scheduling ---
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # --- Permissions ---
  permission_handler: ^11.3.1

  # --- Local storage (document DB) ---
  # Hive pinned to exact tested versions (no codegen, manual TypeAdapter).
  hive: 2.2.3
  hive_flutter: 1.1.0

  # path_provider: used by Hive to resolve the documents directory on
  # mobile platforms during normal app runtime (initFlutter()).
  path_provider: ^2.1.4

  # --- State management ---
  provider: ^6.1.2

  # --- Internationalization / formatting ---
  intl: ^0.19.0

  # --- Audio playback (alarm sounds) ---
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
