name: advanced_alarm_app
description: "Advanced Alarm App — full-screen ringing experience (Agent-06)."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ---------------- Shared data layer (kept in sync with feat/ui-editor) ----
  # Hive: lightweight, fast, NoSQL local database (no codegen required).
  hive: 2.2.3
  hive_flutter: 1.1.0
  # path_provider: used by Hive to resolve the documents directory.
  path_provider: ^2.1.4
  # uuid: stable unique ids for newly created alarms.
  uuid: ^4.5.1

  # ---------------- Ringing experience (Agent-06) ---------------------------
  # Audio playback for the alarm sound — supports duck/loss/release events
  # which we use to handle incoming calls and headphone unplugging.
  audioplayers: ^6.1.0

  # Vibration with custom patterns + per-pattern amplitude.
  vibration: ^2.0.0

  # Keeps the screen awake while the alarm is ringing.
  wakelock_plus: ^1.2.8

  # Accelerometer stream used to detect a "shake to dismiss" gesture.
  sensors_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint set.
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
