name: advanced_alarm_app
description: "Advanced Alarm App — full-featured alarm app with Hive storage, Riverpod state, and rich ringing experience."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ---------------- Data Layer (Agent-02) ----------------
  # Hive: lightweight, fast, NoSQL local database (no codegen required
  # because we manually implement TypeAdapter for full control).
  hive: 2.2.3
  hive_flutter: 1.1.0

  # path_provider: used by Hive to resolve the documents directory on
  # mobile platforms during normal app runtime (initFlutter()).
  path_provider: ^2.1.4

  # ---------------- UI Layer (Agent-04) ----------------
  # Riverpod: declarative, compile-safe reactive state management.
  # Binds the UI to the AlarmRepository stream without manual wiring.
  flutter_riverpod: ^2.5.1

  # ---------------- UI Editor (Agent-05) ----------------
  # uuid: generates stable unique ids for newly created alarms.
  uuid: ^4.5.1

  # ---------------- Ringing Experience (Agent-06) ----------------
  # Audio playback for the alarm sound — supports duck/loss/release events.
  audioplayers: ^6.1.0

  # Vibration with custom patterns + per-pattern amplitude.
  vibration: ^2.0.0

  # Keeps the screen awake while the alarm is ringing.
  wakelock_plus: ^1.2.8

  # Accelerometer stream used to detect a "shake to dismiss" gesture.
  sensors_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^5.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
