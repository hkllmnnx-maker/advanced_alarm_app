name: advanced_alarm_app
description: "Advanced Alarm App - reliable scheduling engine, local persistence, modern UI, full-screen ringing experience and full localization."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # Material/Cupertino/Widgets localizations + RTL plumbing required by
  # the Settings screen (Agent-07) for full Arabic + English support.
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Settings persistence (Agent-07) ---
  # Lightweight key-value storage for user-facing preferences such as
  # theme mode, language, 24h time format, default snooze duration and
  # default ringtone.
  shared_preferences: ^2.3.2

  # --- Notifications & scheduling ---
  flutter_local_notifications: ^17.2.3
  android_alarm_manager_plus: ^4.0.7
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # --- Permissions ---
  permission_handler: ^11.3.1

  # --- Local storage (document DB) ---
  # Hive pinned to exact tested versions (no codegen, manual TypeAdapter).
  hive: 2.2.3
  hive_flutter: 1.1.0

  # path_provider: used by Hive to resolve the documents directory on
  # mobile platforms during normal app runtime (initFlutter()).
  path_provider: ^2.1.4

  # --- State management ---
  # provider is retained from earlier branches for non-UI consumers.
  # flutter_riverpod is the primary state binding for the UI layer
  # (Agent-04: home_screen + alarm_providers).
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # --- Internationalization / formatting ---
  # Pinned to the version bundled with `flutter_localizations` from
  # the Flutter 3.35.4 SDK (see https://dart.dev/go/sdk-version-pinning).
  intl: ^0.20.2

  # --- Audio playback (alarm sounds) ---
  # Supports duck/loss/release events which we use to handle incoming
  # calls and headphone unplugging in the ringing experience.
  audioplayers: ^6.1.0

  # --- ID generation (Agent-05: ui-editor) ---
  # uuid: generates stable unique ids for newly created alarms.
  uuid: ^4.5.1

  # ---------------- Ringing experience (Agent-06) ---------------------------
  # Vibration with custom patterns + per-pattern amplitude.
  vibration: ^2.0.0
  # Keeps the screen awake while the alarm is ringing.
  wakelock_plus: ^1.2.8
  # Accelerometer stream used to detect a "shake to dismiss" gesture.
  sensors_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint set.
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Enable the ARB → AppLocalizations generator (Agent-07: feat/settings).
  # The actual generated files (`lib/l10n/app_localizations*.dart`) are
  # checked-in so the project also builds when running without
  # `flutter pub get` regeneration (e.g. on the build farm).
  generate: true
